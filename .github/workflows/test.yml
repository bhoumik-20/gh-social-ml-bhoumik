name: Test Trending Service

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: "0.11.16"
        enable-cache: true

    - name: Install dependencies
      run: uv sync --locked --dev

    - name: Set up test environment
      run: |
        echo "GITHUB_TOKEN=test_token_12345" >> $GITHUB_ENV
        echo "DATABASE_URL=postgresql://test:test@localhost:5432/test_db" >> $GITHUB_ENV
        echo "TEST_DATABASE_URL=postgresql://test:test@localhost:5432/test_db" >> $GITHUB_ENV

    - name: Run deterministic tests
      env:
        GITHUB_TOKEN: test_token_12345
        DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      run: |
        uv run pytest tests/ -m "not integration and not benchmark" -v --cov=trending --cov-report=xml --cov-report=term-missing

    - name: Run integration tests
      env:
        GITHUB_TOKEN: test_token_12345
        DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      run: |
        uv run pytest tests/ -m "integration" -v

    - name: Run performance benchmarks
      env:
        GITHUB_TOKEN: test_token_12345
        DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_db
      run: |
        uv run pytest tests/ -m "benchmark" --benchmark-only --benchmark-autosave

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: .benchmarks/
