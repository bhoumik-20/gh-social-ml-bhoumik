name: Deploy to AWS

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/gh-social-ml
            git pull --ff-only
            export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
            if ! command -v uv >/dev/null 2>&1; then
              UV_VERSION="0.11.29"
              UV_INSTALLER_SHA256="504a79fd2ed0dcd47e7f04f0792cfd0871f62e24a7fe40fa8ae0f563a369f2bd"
              UV_INSTALLER="$(mktemp)"
              trap 'rm -f "$UV_INSTALLER"' EXIT
              curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
                "https://github.com/astral-sh/uv/releases/download/${UV_VERSION}/uv-installer.sh" \
                --output "$UV_INSTALLER"
              echo "${UV_INSTALLER_SHA256}  ${UV_INSTALLER}" | sha256sum --check --strict
              UV_NO_MODIFY_PATH=1 sh "$UV_INSTALLER"
              rm -f "$UV_INSTALLER"
              trap - EXIT
              export PATH="$HOME/.local/bin:$HOME/.cargo/bin:$PATH"
            fi
            UV_PROJECT_ENVIRONMENT=venv uv sync --locked --no-dev
            sudo systemctl daemon-reload
            sudo systemctl restart gh-social-ml
